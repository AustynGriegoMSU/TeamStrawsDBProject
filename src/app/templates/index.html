{% extends 'base.html' %}
{% block main %}
    Welcome! 
    <p>
    Please, choose an option below:
    </p>   
    <button type="button" class="button" data-target="{{ url_for('login') }}" onclick="simple_action(this.dataset.target)">Login</button>
    <button type="button" class="button" data-target="{{ url_for('signup') }}" onclick="simple_action(this.dataset.target)">Sign Up</button>
    <script type="text/javascript">
        function simple_action(target) {
            window.location = target
        }
    </script>
{% endblock %}
